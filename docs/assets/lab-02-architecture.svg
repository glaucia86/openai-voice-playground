<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="330" viewBox="0 0 1120 330" role="img" aria-labelledby="title desc">
  <title id="title">Lab 02 Realtime Voice Agent architecture</title>
  <desc id="desc">The browser requests server authorization. The server uses the API key only to issue a short-lived client secret. The browser uses that secret to open a WebRTC session directly with the OpenAI Realtime API.</desc>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#a88bff"/></marker></defs>
  <rect width="1120" height="330" rx="28" fill="#07111f"/>
  <text x="42" y="46" fill="#a88bff" font-family="ui-monospace,monospace" font-size="15" font-weight="700">LAB 02 · LIVE SESSION / WEBRTC</text>
  <g fill="#112238" stroke="#304760" stroke-width="2"><rect x="42" y="104" width="190" height="116" rx="18"/><rect x="288" y="104" width="190" height="116" rx="18"/><rect x="534" y="104" width="170" height="116" rx="18"/><rect x="760" y="104" width="150" height="116" rx="18"/><rect x="966" y="104" width="112" height="116" rx="18"/></g>
  <g fill="#f4f8ff" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700" text-anchor="middle">
    <text x="137" y="155">Browser</text><text x="137" y="181">+ microphone</text><text x="383" y="155">Authorization</text><text x="383" y="181">API</text><text x="619" y="146">60-second</text><text x="619" y="172">client secret</text><text x="619" y="198" fill="#a88bff" font-size="13">not the API key</text><text x="835" y="155">WebRTC</text><text x="835" y="181">session</text><text x="1022" y="155">OpenAI</text><text x="1022" y="181">Realtime</text>
  </g>
  <g stroke="#a88bff" stroke-width="3" fill="none" marker-end="url(#arrow)"><path d="M232 162H278"/><path d="M478 162H524"/><path d="M704 162H750"/><path d="M910 162H956"/></g>
  <text x="560" y="285" fill="#9eacc0" font-family="Inter,system-ui,sans-serif" font-size="15" text-anchor="middle">The API key stays on the server; audio and events travel through the browser WebRTC session.</text>
</svg>
